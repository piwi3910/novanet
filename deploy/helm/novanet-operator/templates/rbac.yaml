{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "novanet-operator.fullname" . }}
  labels:
    {{- include "novanet-operator.labels" . | nindent 4 }}
rules:
  # NovaNetCluster management
  - apiGroups:
      - novanet.io
    resources:
      - novanetclusters
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - novanet.io
    resources:
      - novanetclusters/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - novanet.io
    resources:
      - novanetclusters/finalizers
    verbs:
      - update
  # DaemonSets
  - apiGroups:
      - apps
    resources:
      - daemonsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Core resources
  - apiGroups:
      - ""
    resources:
      - services
      - serviceaccounts
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Events
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  # RBAC resources (for creating RBAC for managed components)
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
      - clusterrolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # PodDisruptionBudgets
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "novanet-operator.fullname" . }}
  labels:
    {{- include "novanet-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "novanet-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "novanet-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
