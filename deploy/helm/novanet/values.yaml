# Override the chart name or full name. These are used by _helpers.tpl.
nameOverride: ""
fullnameOverride: ""

image:
  agent:
    repository: ghcr.io/azrtydxb/novanet/novanet-agent
    tag: latest
    pullPolicy: IfNotPresent
  dataplane:
    repository: ghcr.io/azrtydxb/novanet/novanet-dataplane
    tag: latest
    pullPolicy: IfNotPresent
  frr:
    repository: quay.io/frrouting/frr
    tag: "10.3.1"
    pullPolicy: IfNotPresent

imagePullSecrets: []

config:
  clusterCIDR: "10.42.0.0/16"
  nodeCIDRMaskSize: 24
  tunnelProtocol: "geneve"  # geneve or vxlan
  routingMode: "overlay"     # overlay or native
  logLevel: "info"

routing:
  protocol: "bgp"        # bgp or ospf
  frrSocketDir: "/run/frr"
  controlPlaneVIP: ""
  controlPlaneVIPHealthInterval: 5
  bfd:
    enabled: true
    minRxMs: 300
    minTxMs: 300
    detectMultiplier: 3
  # External BGP peers (e.g., TOR routers). Applied on every agent node.
  peers: []
  # Example:
  # peers:
  #   - neighbor_address: "192.168.100.2"
  #     remote_as: 65000
  #     description: "TOR-1"
  #     bfd_enabled: true
  #   - neighbor_address: "192.168.100.3"
  #     remote_as: 65000
  #     description: "TOR-2"
  #     bfd_enabled: true

egress:
  masqueradeEnabled: true

cni:
  binPath: "/opt/cni/bin"    # Host path where CNI binaries are installed.
  confPath: "/etc/cni/net.d"  # Host path where CNI config is written.

policy:
  defaultDeny: false

l4lb:
  enabled: false
  defaultAlgorithm: random  # random, round-robin, maglev

ebpfServices:
  enabled: true
  socketPath: "/run/novanet/ebpf-services.sock"

metrics:
  enabled: true
  port: 9103

tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

nodeSelector:
  kubernetes.io/os: linux

resources:
  agent:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  dataplane:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  frr:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

priorityClassName: system-node-critical

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# PostSync test hooks for ArgoCD CT (Continuous Testing)
tests:
  image: bitnami/kubectl:latest
  smoke:
    enabled: true
  integration:
    enabled: true
