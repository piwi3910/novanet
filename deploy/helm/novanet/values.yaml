# Override the chart name or full name. These are used by _helpers.tpl.
nameOverride: ""
fullnameOverride: ""

image:
  agent:
    repository: ghcr.io/azrtydxb/novanet/novanet-agent
    tag: latest
    pullPolicy: IfNotPresent
  dataplane:
    repository: ghcr.io/azrtydxb/novanet/novanet-dataplane
    tag: latest
    pullPolicy: IfNotPresent

imagePullSecrets: []

config:
  clusterCIDR: "10.42.0.0/16"
  nodeCIDRMaskSize: 24
  tunnelProtocol: "geneve"  # geneve or vxlan
  routingMode: "overlay"     # overlay or native
  logLevel: "info"

novaroute:
  enabled: false
  socket: "/run/novaroute/novaroute.sock"
  # WARNING: Set a real authentication token before enabling NovaRoute.
  token: ""
  protocol: "bgp"  # bgp or ospf
  # controlPlaneVIP is the virtual IP for the Kubernetes API server.
  # On control-plane nodes, the agent binds this IP on loopback and
  # advertises it via BGP for ECMP.
  controlPlaneVIP: ""
  # BFD (Bidirectional Forwarding Detection) for sub-second failover.
  bfd:
    # -- Enable BFD on mesh BGP peers
    enabled: true
    # -- Minimum receive interval in milliseconds (0 = FRR default 300ms)
    minRxMs: 300
    # -- Minimum transmit interval in milliseconds (0 = FRR default 300ms)
    minTxMs: 300
    # -- Detect multiplier (0 = FRR default 3)
    detectMultiplier: 3

egress:
  masqueradeEnabled: true

cni:
  binPath: "/opt/cni/bin"    # Host path where CNI binaries are installed.
  confPath: "/etc/cni/net.d"  # Host path where CNI config is written.

policy:
  defaultDeny: false

l4lb:
  enabled: false
  defaultAlgorithm: random  # random, round-robin, maglev

metrics:
  enabled: true
  port: 9103

tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

nodeSelector:
  kubernetes.io/os: linux

resources:
  agent:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  dataplane:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi

priorityClassName: system-node-critical

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# PostSync test hooks for ArgoCD CT (Continuous Testing)
tests:
  image: bitnami/kubectl:latest
  smoke:
    enabled: true
  integration:
    enabled: true
