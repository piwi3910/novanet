apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "novanet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novanet.labels" . | nindent 4 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "novanet.selectorLabels" . | nindent 6 }}
