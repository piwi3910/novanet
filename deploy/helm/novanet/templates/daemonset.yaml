apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "novanet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novanet.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "novanet.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "novanet.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/cni-config: {{ include (print $.Template.BasePath "/cni-config.yaml") . | sha256sum }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "novanet.serviceAccountName" . }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: install-cni
          image: {{ .Values.image.agent.repository }}:{{ .Values.image.agent.tag }}
          imagePullPolicy: {{ .Values.image.agent.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              # Copy the CNI binary to the host.
              cp /usr/bin/novanet-cni /host/opt/cni/bin/novanet-cni
              chmod 755 /host/opt/cni/bin/novanet-cni
              # Install the loopback plugin (required by containerd CRI).
              cp /usr/lib/cni/loopback /host/opt/cni/bin/loopback
              chmod 755 /host/opt/cni/bin/loopback
              # Write the CNI configuration to the host.
              cp /cni-config/10-novanet.conflist /host/etc/cni/net.d/10-novanet.conflist
              echo "CNI binary and config installed."
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
            - name: cni-conf
              mountPath: /host/etc/cni/net.d
            - name: cni-config
              mountPath: /cni-config
              readOnly: true
          securityContext:
            privileged: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: agent
          image: {{ .Values.image.agent.repository }}:{{ .Values.image.agent.tag }}
          imagePullPolicy: {{ .Values.image.agent.pullPolicy }}
          command:
            - novanet-agent
            - --config
            - /etc/novanet/novanet.json
          env:
            - name: NOVANET_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          livenessProbe:
            exec:
              command:
                - novanetctl
                - status
                - --agent-socket
                - /run/novanet/novanet.sock
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - novanetctl
                - status
                - --agent-socket
                - /run/novanet/novanet.sock
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.agent | nindent 12 }}
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - BPF
                - NET_RAW
                - SYS_RESOURCE
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/novanet
              readOnly: true
            - name: run-novanet
              mountPath: /run/novanet
            {{- if eq (lower .Values.config.routingMode) "native" }}
            - name: frr-run
              mountPath: /run/frr
            {{- end }}
            - name: netns
              mountPath: /run/netns
              mountPropagation: HostToContainer
            - name: bpf-maps
              mountPath: /sys/fs/bpf
              mountPropagation: Bidirectional
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: cni-state
              mountPath: /var/lib/cni

        - name: dataplane
          image: {{ .Values.image.dataplane.repository }}:{{ .Values.image.dataplane.tag }}
          imagePullPolicy: {{ .Values.image.dataplane.pullPolicy }}
          command:
            - novanet-dataplane
            - --socket
            - /run/novanet/dataplane.sock
          livenessProbe:
            exec:
              command:
                - test
                - -S
                - /run/novanet/dataplane.sock
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - test
                - -S
                - /run/novanet/dataplane.sock
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.dataplane | nindent 12 }}
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - BPF
                - NET_RAW
                - SYS_RESOURCE
                - PERFMON
              drop:
                - ALL
          volumeMounts:
            - name: run-novanet
              mountPath: /run/novanet
            - name: bpf-maps
              mountPath: /sys/fs/bpf
              mountPropagation: Bidirectional
            - name: proc
              mountPath: /proc
              readOnly: true

        {{- if eq (lower .Values.config.routingMode) "native" }}
        - name: frr
          image: "{{ .Values.image.frr.repository }}:{{ .Values.image.frr.tag }}"
          imagePullPolicy: {{ .Values.image.frr.pullPolicy }}
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
              drop:
                - ALL
          volumeMounts:
            - name: frr-run
              mountPath: /run/frr
            - name: frr-config
              mountPath: /etc/frr
          resources:
            {{- toYaml .Values.resources.frr | nindent 12 }}
        {{- end }}

      terminationGracePeriodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ include "novanet.fullname" . }}
        - name: cni-config
          configMap:
            name: {{ include "novanet.fullname" . }}-cni
        - name: run-novanet
          hostPath:
            path: /run/novanet
            type: DirectoryOrCreate
        {{- if eq (lower .Values.config.routingMode) "native" }}
        - name: frr-run
          emptyDir: {}
        - name: frr-config
          configMap:
            name: {{ include "novanet.fullname" . }}-frr-config
        {{- end }}
        - name: cni-bin
          hostPath:
            path: {{ .Values.cni.binPath | default "/opt/cni/bin" }}
            type: DirectoryOrCreate
        - name: cni-conf
          hostPath:
            path: {{ .Values.cni.confPath | default "/etc/cni/net.d" }}
            type: DirectoryOrCreate
        - name: netns
          hostPath:
            path: /run/netns
            type: DirectoryOrCreate
        - name: bpf-maps
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
        - name: cni-state
          hostPath:
            path: /var/lib/cni
            type: DirectoryOrCreate
