apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "novanet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novanet.labels" . | nindent 4 }}
data:
  novanet.json: |
    {
      "listen_socket": "/run/novanet/novanet.sock",
      "cni_socket": "/run/novanet/cni.sock",
      "dataplane_socket": "/run/novanet/dataplane.sock",
      "cluster_cidr": {{ .Values.config.clusterCIDR | quote }},
      "node_cidr_mask_size": {{ .Values.config.nodeCIDRMaskSize }},
      "tunnel_protocol": {{ .Values.config.tunnelProtocol | quote }},
      "routing_mode": {{ .Values.config.routingMode | quote }},
      "routing": {
        "protocol": {{ .Values.routing.protocol | quote }},
        "frr_socket_dir": {{ .Values.routing.frrSocketDir | quote }},
        "control_plane_vip": {{ .Values.routing.controlPlaneVIP | quote }},
        "control_plane_vip_health_interval": {{ .Values.routing.controlPlaneVIPHealthInterval | int }},
        "bfd_enabled": {{ .Values.routing.bfd.enabled }},
        "bfd_min_rx_ms": {{ .Values.routing.bfd.minRxMs | int }},
        "bfd_min_tx_ms": {{ .Values.routing.bfd.minTxMs | int }},
        "bfd_detect_mult": {{ .Values.routing.bfd.detectMultiplier | int }},
        "peers": {{ .Values.routing.peers | default list | toJson }}
      },
      "egress": {
        "masquerade_enabled": {{ .Values.egress.masqueradeEnabled }}
      },
      "policy": {
        "default_deny": {{ .Values.policy.defaultDeny }}
      },
      "l4lb": {
        "enabled": {{ .Values.l4lb.enabled }},
        "default_algorithm": {{ .Values.l4lb.defaultAlgorithm | quote }}
      },
      "log_level": {{ .Values.config.logLevel | quote }},
      "metrics_address": ":{{ .Values.metrics.port }}"
    }
