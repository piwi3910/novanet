{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "novanet.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novanet.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.metrics.port | quote }}
spec:
  # Headless service: Prometheus discovers individual pod IPs via endpoint
  # scraping, which is the standard pattern for DaemonSet metrics.
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "novanet.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
