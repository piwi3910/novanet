apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "novanet.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novanet.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "novanet.fullname" . }}
  labels:
    {{- include "novanet.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups: [""]
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "novanet.fullname" . }}
  labels:
    {{- include "novanet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "novanet.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "novanet.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
