syntax = "proto3";

package novanet.v1;

option go_package = "github.com/azrtydxb/novanet/api/v1";

// DataplaneControl is the internal API between the Go management plane
// and the Rust eBPF dataplane. The Rust dataplane runs the gRPC server,
// the Go agent is the client.
service DataplaneControl {
  // Endpoint management
  rpc UpsertEndpoint(UpsertEndpointRequest) returns (UpsertEndpointResponse);
  rpc DeleteEndpoint(DeleteEndpointRequest) returns (DeleteEndpointResponse);

  // Policy management
  rpc UpsertPolicy(UpsertPolicyRequest) returns (UpsertPolicyResponse);
  rpc DeletePolicy(DeletePolicyRequest) returns (DeletePolicyResponse);
  rpc SyncPolicies(SyncPoliciesRequest) returns (SyncPoliciesResponse);

  // Tunnel management (overlay mode)
  rpc UpsertTunnel(UpsertTunnelRequest) returns (UpsertTunnelResponse);
  rpc DeleteTunnel(DeleteTunnelRequest) returns (DeleteTunnelResponse);

  // Configuration
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);

  // TC program lifecycle
  rpc AttachProgram(AttachProgramRequest) returns (AttachProgramResponse);
  rpc DetachProgram(DetachProgramRequest) returns (DetachProgramResponse);

  // Egress policy management
  rpc UpsertEgressPolicy(UpsertEgressPolicyRequest) returns (UpsertEgressPolicyResponse);
  rpc DeleteEgressPolicy(DeleteEgressPolicyRequest) returns (DeleteEgressPolicyResponse);

  // L4 Load Balancer
  rpc UpsertService(UpsertServiceRequest) returns (UpsertServiceResponse);
  rpc DeleteService(DeleteServiceRequest) returns (DeleteServiceResponse);
  rpc UpsertBackends(UpsertBackendsRequest) returns (UpsertBackendsResponse);
  rpc SyncServices(SyncServicesRequest) returns (SyncServicesResponse);
  rpc UpsertMaglevTable(UpsertMaglevTableRequest) returns (UpsertMaglevTableResponse);

  // Host firewall
  rpc UpsertHostPolicy(UpsertHostPolicyRequest) returns (UpsertHostPolicyResponse);
  rpc DeleteHostPolicy(DeleteHostPolicyRequest) returns (DeleteHostPolicyResponse);
  rpc SyncHostPolicies(SyncHostPoliciesRequest) returns (SyncHostPoliciesResponse);

  // XDP management
  rpc AttachXDP(AttachXDPRequest) returns (AttachXDPResponse);
  rpc DetachXDP(DetachXDPRequest) returns (DetachXDPResponse);

  // SOCKMAP endpoints
  rpc UpsertSockmapEndpoint(UpsertSockmapEndpointRequest) returns (UpsertSockmapEndpointResponse);
  rpc DeleteSockmapEndpoint(DeleteSockmapEndpointRequest) returns (DeleteSockmapEndpointResponse);
  rpc GetSockmapStats(GetInternalSockmapStatsRequest) returns (GetInternalSockmapStatsResponse);

  // Mesh redirect
  rpc UpsertMeshService(UpsertMeshServiceRequest) returns (UpsertMeshServiceResponse);
  rpc DeleteMeshService(DeleteMeshServiceRequest) returns (DeleteMeshServiceResponse);
  rpc ListMeshServices(ListInternalMeshServicesRequest) returns (ListInternalMeshServicesResponse);

  // Rate limiting
  rpc UpdateRateLimitConfig(UpdateRateLimitConfigRequest) returns (UpdateRateLimitConfigResponse);
  rpc GetInternalRateLimitStats(GetInternalRateLimitStatsRequest) returns (GetInternalRateLimitStatsResponse);

  // Health monitoring
  rpc GetBackendHealthStats(GetBackendHealthStatsRequest) returns (GetBackendHealthStatsResponse);

  // Observability
  rpc StreamFlows(StreamFlowsRequest) returns (stream FlowEvent);
  rpc GetDataplaneStatus(GetDataplaneStatusRequest) returns (GetDataplaneStatusResponse);
}

// AgentControl is the API exposed by the Go agent for CNI binary
// and CLI tool connections.
service AgentControl {
  // CNI operations
  rpc AddPod(AddPodRequest) returns (AddPodResponse);
  rpc DelPod(DelPodRequest) returns (DelPodResponse);

  // Status
  rpc GetAgentStatus(GetAgentStatusRequest) returns (GetAgentStatusResponse);

  // Flow streaming (proxied from dataplane)
  rpc StreamAgentFlows(StreamAgentFlowsRequest) returns (stream FlowEvent);

  // List RPCs (CLI)
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
  rpc ListIdentities(ListIdentitiesRequest) returns (ListIdentitiesResponse);
  rpc ListTunnels(ListTunnelsRequest) returns (ListTunnelsResponse);
  rpc ListEgressPolicies(ListEgressPoliciesRequest) returns (ListEgressPoliciesResponse);
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);

  // Routing RPCs (native mode — queries FRR state via routing manager)
  rpc GetRoutingPeers(GetRoutingPeersRequest) returns (GetRoutingPeersResponse);
  rpc GetRoutingPrefixes(GetRoutingPrefixesRequest) returns (GetRoutingPrefixesResponse);
  rpc GetRoutingBFDSessions(GetRoutingBFDSessionsRequest) returns (GetRoutingBFDSessionsResponse);
  rpc GetRoutingOSPFNeighbors(GetRoutingOSPFNeighborsRequest) returns (GetRoutingOSPFNeighborsResponse);
  rpc StreamRoutingEvents(StreamRoutingEventsRequest) returns (stream RoutingEvent);
}

// IPVersion identifies the address family.
enum IPVersion {
  IP_VERSION_UNSPECIFIED = 0;
  IPv4 = 1;
  IPv6 = 2;
}

// --- Endpoints ---

message UpsertEndpointRequest {
  string ip = 1;               // "10.0.0.1" or "fd00::1" — Cilium-style string IP.
  uint32 ifindex = 2;
  bytes mac = 3;
  uint32 identity_id = 4;
  string pod_name = 5;         // Logging only — not stored in eBPF maps.
  string namespace = 6;        // Logging only — not stored in eBPF maps.
  string node_ip = 7;          // "10.0.0.1" or "fd00::1"
}
message UpsertEndpointResponse {}

message DeleteEndpointRequest {
  string ip = 1;               // "10.0.0.1" or "fd00::1"
}
message DeleteEndpointResponse {}

// --- Policies ---

message UpsertPolicyRequest {
  uint32 src_identity = 1;
  uint32 dst_identity = 2;
  uint32 protocol = 3;
  uint32 dst_port = 4;
  PolicyAction action = 5;
}
message UpsertPolicyResponse {}

message DeletePolicyRequest {
  uint32 src_identity = 1;
  uint32 dst_identity = 2;
  uint32 protocol = 3;
  uint32 dst_port = 4;
}
message DeletePolicyResponse {}

message SyncPoliciesRequest {
  repeated PolicyEntry policies = 1;
}
message PolicyEntry {
  uint32 src_identity = 1;
  uint32 dst_identity = 2;
  uint32 protocol = 3;
  uint32 dst_port = 4;
  PolicyAction action = 5;
}
message SyncPoliciesResponse {
  uint32 added = 1;
  uint32 removed = 2;
  uint32 updated = 3;
}

enum PolicyAction {
  POLICY_ACTION_DENY = 0;
  POLICY_ACTION_ALLOW = 1;
}

// --- Tunnels ---

message UpsertTunnelRequest {
  string node_ip = 1;          // "10.0.0.1" or "fd00::1"
  uint32 tunnel_ifindex = 2;
  uint32 vni = 3;
}
message UpsertTunnelResponse {}

message DeleteTunnelRequest {
  string node_ip = 1;          // "10.0.0.1" or "fd00::1"
}
message DeleteTunnelResponse {}

// --- Config ---

message UpdateConfigRequest {
  map<uint32, uint64> entries = 1;
  // IPv6 config: 128-bit addresses stored across two consecutive u64 keys.
  // Use CONFIG_KEY_NODE_IPV6 (key 20) for upper 64 bits, key 21 for lower 64 bits.
  // Same pattern for cluster CIDR v6 (22/23), pod CIDR v6 (24/25), SNAT v6 (26/27).
}
message UpdateConfigResponse {}

// --- TC Programs ---

message AttachProgramRequest {
  string interface_name = 1;
  AttachType attach_type = 2;
}
enum AttachType {
  ATTACH_TC_INGRESS = 0;
  ATTACH_TC_EGRESS = 1;
}
message AttachProgramResponse {}

message DetachProgramRequest {
  string interface_name = 1;
  AttachType attach_type = 2;
}
message DetachProgramResponse {}

// --- Observability ---

message StreamFlowsRequest {
  uint32 identity_filter = 1;
}

message FlowEvent {
  string src_ip = 1;            // "10.0.0.1" or "fd00::1"
  string dst_ip = 2;            // "10.0.0.1" or "fd00::1"
  uint32 src_identity = 3;
  uint32 dst_identity = 4;
  uint32 protocol = 5;
  uint32 src_port = 6;
  uint32 dst_port = 7;
  PolicyAction verdict = 8;
  uint64 bytes = 9;
  uint64 packets = 10;
  int64 timestamp_ns = 11;
  DropReason drop_reason = 12;
  uint32 tcp_flags = 13;       // TCP flags (SYN=0x02, ACK=0x10, FIN=0x01, RST=0x04)
  IPVersion ip_version = 14;   // Address family of this flow event.
}

enum DropReason {
  DROP_REASON_NONE = 0;
  DROP_REASON_POLICY_DENIED = 1;
  DROP_REASON_NO_IDENTITY = 2;
  DROP_REASON_NO_ROUTE = 3;
  DROP_REASON_NO_TUNNEL = 4;
  DROP_REASON_TTL_EXCEEDED = 5;
}

message GetDataplaneStatusRequest {}
message GetDataplaneStatusResponse {
  uint32 endpoint_count = 1;
  uint32 policy_count = 2;
  uint32 tunnel_count = 3;
  repeated AttachedProgram programs = 4;
  string mode = 5;
  string tunnel_protocol = 6;
  map<uint32, uint64> drop_counters = 7;
  uint32 service_count = 8;
  uint32 conntrack_count = 9;
}

message AttachedProgram {
  string interface_name = 1;
  string attach_type = 2;
  uint32 program_id = 3;
}

// --- CNI Operations ---

message AddPodRequest {
  string pod_name = 1;
  string pod_namespace = 2;
  string container_id = 3;
  string netns = 4;
  string if_name = 5;
  map<string, string> labels = 6;
}

message AddPodResponse {
  string ip = 1;
  string gateway = 2;
  string mac = 3;
  int32 prefix_length = 4;
  string ipv6 = 5;              // IPv6 address (dual-stack).
  string gateway_v6 = 6;        // IPv6 gateway (dual-stack).
  int32 prefix_length_v6 = 7;   // IPv6 prefix length (dual-stack).
}

message DelPodRequest {
  string pod_name = 1;
  string pod_namespace = 2;
  string container_id = 3;
  string netns = 4;
  string if_name = 5;
}
message DelPodResponse {}

// --- Agent Status ---

message GetAgentStatusRequest {}
message GetAgentStatusResponse {
  string routing_mode = 1;
  string tunnel_protocol = 2;
  uint32 endpoint_count = 3;
  uint32 policy_count = 4;
  uint32 tunnel_count = 5;
  uint32 identity_count = 6;
  string node_ip = 7;
  string pod_cidr = 8;
  string cluster_cidr = 9;
  bool novaroute_connected = 10;
  DataplaneStatusInfo dataplane = 11;
  string encryption = 12;           // "disabled" or "wireguard"
  bool host_firewall = 13;
  bool bandwidth_enabled = 14;
  bool ipv6_enabled = 15;
  bool dsr_enabled = 16;
  string xdp_mode = 17;
  bool lb_ipam_enabled = 18;
}

message DataplaneStatusInfo {
  bool connected = 1;
  uint32 attached_programs = 2;
}

message StreamAgentFlowsRequest {
  uint32 identity_filter = 1;
  bool drops_only = 2;
}

// --- Egress ---

message UpsertEgressPolicyRequest {
  uint32 src_identity = 1;
  string dst_cidr = 2;              // "10.0.0.0/24" or "fd00::/64" — CIDR string.
  uint32 dst_cidr_prefix_len = 3;
  uint32 protocol = 4;
  uint32 dst_port = 5;
  EgressAction action = 6;
  string snat_ip = 7;               // "10.0.0.1" or "fd00::1" — SNAT target IP.
}
message UpsertEgressPolicyResponse {}

message DeleteEgressPolicyRequest {
  uint32 src_identity = 1;
  string dst_cidr = 2;              // "10.0.0.0/24" or "fd00::/64"
  uint32 dst_cidr_prefix_len = 3;
  uint32 protocol = 4;
  uint32 dst_port = 5;
}
message DeleteEgressPolicyResponse {}

enum EgressAction {
  EGRESS_ACTION_DENY = 0;
  EGRESS_ACTION_ALLOW = 1;
  EGRESS_ACTION_SNAT = 2;
}

// --- L4 Load Balancer ---

// Service flags.
enum ServiceFlag {
  SERVICE_FLAG_NONE = 0;
  SERVICE_FLAG_DSR = 1;             // Direct Server Return
  SERVICE_FLAG_EXTERNAL_LOCAL = 2;  // externalTrafficPolicy: Local
  SERVICE_FLAG_INTERNAL_LOCAL = 4;  // internalTrafficPolicy: Local
}

message UpsertServiceRequest {
  string ip = 1;                    // "10.0.0.1" or "fd00::1"
  uint32 port = 2;
  uint32 protocol = 3;
  uint32 scope = 4;
  uint32 backend_count = 5;
  uint32 backend_offset = 6;
  uint32 algorithm = 7;
  uint32 flags = 8;
  uint32 affinity_timeout = 9;
  uint32 maglev_offset = 10;
}
message UpsertServiceResponse {}

message DeleteServiceRequest {
  string ip = 1;                    // "10.0.0.1" or "fd00::1"
  uint32 port = 2;
  uint32 protocol = 3;
  uint32 scope = 4;
}
message DeleteServiceResponse {}

message UpsertBackendsRequest {
  repeated BackendEntry backends = 1;
}
message BackendEntry {
  uint32 index = 1;
  string ip = 2;                    // "10.0.0.1" or "fd00::1"
  uint32 port = 3;
  string node_ip = 4;              // "10.0.0.1" or "fd00::1"
}
message UpsertBackendsResponse {}

message SyncServicesRequest {
  repeated ServiceEntry services = 1;
  repeated BackendEntry backends = 2;
}
message ServiceEntry {
  string ip = 1;                    // "10.0.0.1" or "fd00::1"
  uint32 port = 2;
  uint32 protocol = 3;
  uint32 scope = 4;
  uint32 backend_count = 5;
  uint32 backend_offset = 6;
  uint32 algorithm = 7;
  uint32 flags = 8;
  uint32 affinity_timeout = 9;
  uint32 maglev_offset = 10;
}
message SyncServicesResponse {
  uint32 services_synced = 1;
  uint32 backends_synced = 2;
}

message UpsertMaglevTableRequest {
  uint32 offset = 1;
  repeated uint32 entries = 2;
}
message UpsertMaglevTableResponse {}

// --- List RPCs (CLI) ---

message ListPoliciesRequest {}
message ListPoliciesResponse {
  repeated PolicyRuleInfo rules = 1;
}
message PolicyRuleInfo {
  uint32 src_identity = 1;
  uint32 dst_identity = 2;
  uint32 protocol = 3;
  uint32 dst_port = 4;
  PolicyAction action = 5;
}

message ListIdentitiesRequest {}
message ListIdentitiesResponse {
  repeated IdentityInfo identities = 1;
}
message IdentityInfo {
  uint32 identity_id = 1;
  map<string, string> labels = 2;
  uint32 ref_count = 3;
}

message ListTunnelsRequest {}
message ListTunnelsResponse {
  repeated TunnelInfoMsg tunnels = 1;
}
message TunnelInfoMsg {
  string node_name = 1;
  string node_ip = 2;
  string pod_cidr = 3;
  string interface_name = 4;
  uint32 ifindex = 5;
  string protocol = 6;
}

message ListEgressPoliciesRequest {}
message ListEgressPoliciesResponse {
  repeated EgressPolicyInfo rules = 1;
}
message EgressPolicyInfo {
  string namespace = 1;  // Source Kubernetes namespace of the egress rule.
  string name = 2;       // Name of the egress rule.
  uint32 src_identity = 3;
  string dst_cidr = 4;
  uint32 protocol = 5;
  uint32 dst_port = 6;
  EgressAction action = 7;
}

message ListServicesRequest {}
message ListServicesResponse {
  repeated ServiceInfo services = 1;
}
message ServiceInfo {
  string cluster_ip = 1;
  uint32 port = 2;
  string protocol = 3;
  string scope = 4;
  uint32 backend_count = 5;
  string algorithm = 6;
  repeated string backends = 7;
  bool dsr = 8;
}

// --- Host Firewall ---

message UpsertHostPolicyRequest {
  string rule_id = 1;         // Unique rule identifier.
  HostPolicyDirection direction = 2;
  uint32 protocol = 3;
  bytes cidr_ip = 4;           // 4 or 16 bytes for IPv4/IPv6.
  uint32 cidr_prefix_len = 5;
  uint32 port = 6;
  uint32 end_port = 7;        // 0 = single port.
  PolicyAction action = 8;
}
message UpsertHostPolicyResponse {}

message DeleteHostPolicyRequest {
  string rule_id = 1;
}
message DeleteHostPolicyResponse {}

message SyncHostPoliciesRequest {
  repeated HostPolicyEntry policies = 1;
}
message HostPolicyEntry {
  string rule_id = 1;
  HostPolicyDirection direction = 2;
  uint32 protocol = 3;
  bytes cidr_ip = 4;
  uint32 cidr_prefix_len = 5;
  uint32 port = 6;
  uint32 end_port = 7;
  PolicyAction action = 8;
}
message SyncHostPoliciesResponse {
  uint32 added = 1;
  uint32 removed = 2;
}

enum HostPolicyDirection {
  HOST_POLICY_INGRESS = 0;
  HOST_POLICY_EGRESS = 1;
}

// --- XDP ---

message AttachXDPRequest {
  string interface_name = 1;
  XDPMode mode = 2;
}
message AttachXDPResponse {}

message DetachXDPRequest {
  string interface_name = 1;
}
message DetachXDPResponse {}

enum XDPMode {
  XDP_MODE_NATIVE = 0;
  XDP_MODE_SKB = 1;       // Generic/SKB fallback.
}

// --- Routing (BGP/BFD/OSPF via FRR) ---

message GetRoutingPeersRequest {}
message GetRoutingPeersResponse {
  repeated RoutingPeerInfo peers = 1;
}
message RoutingPeerInfo {
  string neighbor_address = 1;
  uint32 remote_as = 2;
  string state = 3;            // "Established", "Idle", "Connect", etc.
  string uptime = 4;
  uint32 prefixes_received = 5;
  uint32 prefixes_sent = 6;
  string description = 7;
  uint32 msg_received = 8;
  uint32 msg_sent = 9;
  string bfd_status = 10;     // "up", "down", "" (not enabled)
  string owner = 11;          // Intent owner (e.g., "novanet", "_config")
}

message GetRoutingPrefixesRequest {}
message GetRoutingPrefixesResponse {
  repeated RoutingPrefixInfo prefixes = 1;
}
message RoutingPrefixInfo {
  string prefix = 1;          // e.g., "10.42.0.0/24"
  string protocol = 2;        // "bgp" or "ospf"
  string state = 3;           // "advertised", "received"
  string owner = 4;           // Intent owner
}

message GetRoutingBFDSessionsRequest {}
message GetRoutingBFDSessionsResponse {
  repeated RoutingBFDSessionInfo sessions = 1;
}
message RoutingBFDSessionInfo {
  string peer_address = 1;
  string status = 2;          // "up", "down", "init"
  string uptime = 3;
  uint32 min_rx_ms = 4;
  uint32 min_tx_ms = 5;
  uint32 detect_multiplier = 6;
  string interface_name = 7;
  string owner = 8;
}

message GetRoutingOSPFNeighborsRequest {}
message GetRoutingOSPFNeighborsResponse {
  repeated RoutingOSPFNeighborInfo neighbors = 1;
}
message RoutingOSPFNeighborInfo {
  string neighbor_id = 1;
  string address = 2;
  string interface_name = 3;
  string state = 4;           // "Full", "2-Way", "Init", etc.
  string owner = 5;
}

message StreamRoutingEventsRequest {
  string owner_filter = 1;       // Optional: filter by owner name.
  repeated string event_types = 2; // Optional: filter by event type names.
}
message RoutingEvent {
  int64 timestamp_ns = 1;
  string event_type = 2;      // "peer_up", "peer_down", "bfd_up", etc.
  string owner = 3;
  string detail = 4;
  map<string, string> metadata = 5;
}

// --- SOCKMAP Endpoints ---

message UpsertSockmapEndpointRequest {
  string ip = 1;                    // "10.0.0.1"
  uint32 port = 2;
}
message UpsertSockmapEndpointResponse {}

message DeleteSockmapEndpointRequest {
  string ip = 1;                    // "10.0.0.1"
  uint32 port = 2;
}
message DeleteSockmapEndpointResponse {}

message GetInternalSockmapStatsRequest {}
message GetInternalSockmapStatsResponse {
  uint64 redirected = 1;
  uint64 fallback = 2;
  uint32 active_endpoints = 3;
}

// --- Mesh Redirect ---

message UpsertMeshServiceRequest {
  string ip = 1;                    // "10.0.0.1"
  uint32 port = 2;
  uint32 redirect_port = 3;
}
message UpsertMeshServiceResponse {}

message DeleteMeshServiceRequest {
  string ip = 1;                    // "10.0.0.1"
  uint32 port = 2;
}
message DeleteMeshServiceResponse {}

message ListInternalMeshServicesRequest {}
message ListInternalMeshServicesResponse {
  repeated InternalMeshServiceEntry entries = 1;
}
message InternalMeshServiceEntry {
  string ip = 1;
  uint32 port = 2;
  uint32 redirect_port = 3;
}

// --- Rate Limiting ---

message UpdateRateLimitConfigRequest {
  uint32 rate = 1;
  uint32 burst = 2;
  uint64 window_ns = 3;
}
message UpdateRateLimitConfigResponse {}

message GetInternalRateLimitStatsRequest {}
message GetInternalRateLimitStatsResponse {
  uint64 allowed = 1;
  uint64 denied = 2;
}

// --- Backend Health ---

message GetBackendHealthStatsRequest {
  string ip = 1;                    // "10.0.0.1" — optional filter; empty = all.
  uint32 port = 2;
}
message GetBackendHealthStatsResponse {
  repeated InternalBackendHealthInfo backends = 1;
}
message InternalBackendHealthInfo {
  string ip = 1;
  uint32 port = 2;
  uint64 total_conns = 3;
  uint64 failed_conns = 4;
  uint64 timeout_conns = 5;
  uint64 success_conns = 6;
  uint64 avg_rtt_ns = 7;
  double failure_rate = 8;
}
