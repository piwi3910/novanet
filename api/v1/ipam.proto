syntax = "proto3";

package novanet.v1;

option go_package = "github.com/azrtydxb/novanet/api/v1";

// IPAMService provides cluster-wide IP address management for the Nova
// ecosystem. All Nova projects (NovaEdge, NovaRoute, NovaNet) can consume
// this service via a Unix domain socket at /run/novanet/ipam.sock.
service IPAMService {
  // Allocate requests the next available IP from a pool (by name or type).
  rpc Allocate(AllocateRequest) returns (AllocateResponse);

  // AllocateSpecific requests a specific IP from a pool.
  rpc AllocateSpecific(AllocateSpecificRequest) returns (AllocateSpecificResponse);

  // Release releases a previously allocated IP.
  rpc Release(ReleaseRequest) returns (ReleaseResponse);

  // Validate checks if an IP is valid and available in a pool.
  rpc Validate(ValidateRequest) returns (ValidateResponse);

  // GetPool returns pool status and allocation info.
  rpc GetPool(GetPoolRequest) returns (GetPoolResponse);

  // ListPools lists all pools with optional type filter.
  rpc ListIPPools(ListIPPoolsRequest) returns (ListIPPoolsResponse);

  // ListAllocations lists allocations with owner/pool/type filters.
  rpc ListIPAllocations(ListIPAllocationsRequest) returns (ListIPAllocationsResponse);

  // WatchPools provides a server-streaming RPC for pool change events.
  rpc WatchPools(WatchPoolsRequest) returns (stream PoolEvent);
}

// --- Allocate ---

message AllocateRequest {
  // pool_name is the target pool name. If empty, pool_type is used for auto-selection.
  string pool_name = 1;
  // pool_type selects the first auto-assign pool of this type when pool_name is empty.
  string pool_type = 2;
  // owner identifies the allocating client (e.g. "novaedge", "novanet-agent").
  string owner = 3;
  // resource is an optional K8s resource reference (e.g. "novaedge/proxyvip/my-vip").
  string resource = 4;
}

message AllocateResponse {
  string ip = 1;
  string pool_name = 2;
}

// --- AllocateSpecific ---

message AllocateSpecificRequest {
  string pool_name = 1;
  string ip = 2;
  string owner = 3;
  string resource = 4;
}

message AllocateSpecificResponse {}

// --- Release ---

message ReleaseRequest {
  string pool_name = 1;
  string ip = 2;
}

message ReleaseResponse {}

// --- Validate ---

message ValidateRequest {
  string pool_name = 1;
  string ip = 2;
}

message ValidateResponse {
  bool valid = 1;
  bool available = 2;
}

// --- GetPool ---

message GetPoolRequest {
  string name = 1;
}

message GetPoolResponse {
  string name = 1;
  string type = 2;
  int32 allocated = 3;
  int32 total = 4;
  int32 available = 5;
  repeated IPAllocationInfo allocations = 6;
}

// --- ListIPPools ---

message ListIPPoolsRequest {
  // type_filter limits results to pools of this type. Empty = all.
  string type_filter = 1;
}

message ListIPPoolsResponse {
  repeated PoolInfo pools = 1;
}

message PoolInfo {
  string name = 1;
  string type = 2;
  int32 allocated = 3;
  int32 total = 4;
  int32 available = 5;
  string owner = 6;
  bool auto_assign = 7;
}

// --- ListIPAllocations ---

message ListIPAllocationsRequest {
  string pool_filter = 1;
  string owner_filter = 2;
  string type_filter = 3;
}

message ListIPAllocationsResponse {
  repeated IPAllocationInfo allocations = 1;
}

message IPAllocationInfo {
  string ip = 1;
  string owner = 2;
  string resource = 3;
  int64 timestamp_unix = 4;
}

// --- WatchPools ---

message WatchPoolsRequest {}

message PoolEvent {
  string pool_name = 1;
  string event_type = 2; // "ADDED", "MODIFIED", "DELETED"
  PoolInfo pool = 3;
}
