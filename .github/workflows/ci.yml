name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: 'Run integration tests against a live cluster'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy' and commit the changes."
            git diff go.mod go.sum
            exit 1
          fi

  lint-helm:
    name: Lint (Helm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/novanet/

      - name: Template render check
        run: helm template novanet deploy/helm/novanet/ > /dev/null

  lint-rust:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dataplane/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('dataplane/Cargo.lock') }}

      - name: Check formatting
        working-directory: dataplane
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: dataplane
        run: cargo clippy --package novanet-common --package novanet-dataplane -- -D warnings

  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build-go:
    name: Build (${{ matrix.binary }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - binary: novanet-agent
            path: ./cmd/novanet-agent/
          - binary: novanet-cni
            path: ./cmd/novanet-cni/
          - binary: novanetctl
            path: ./cmd/novanetctl/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build ${{ matrix.binary }}
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/${{ matrix.binary }} ${{ matrix.path }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: bin/${{ matrix.binary }}
          retention-days: 7

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dataplane/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('dataplane/Cargo.lock') }}

      # Note: novanet-ebpf is excluded — eBPF programs compile to BPF bytecode
      # and cannot be unit-tested in userspace. They are validated via the
      # integration test suite on a real cluster.
      - name: Run novanet-common tests
        working-directory: dataplane
        run: cargo test -p novanet-common --features userspace

      - name: Run novanet-dataplane tests
        working-directory: dataplane
        run: cargo test -p novanet-dataplane

  build-rust:
    name: Build (Rust/eBPF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Rust/eBPF via Docker
        run: |
          docker build -f Dockerfile.build -t novanet-builder .
          docker create --name novanet-extract novanet-builder /bin/true
          mkdir -p bin
          docker cp novanet-extract:/build/dataplane/target/release/novanet-dataplane bin/novanet-dataplane
          docker cp novanet-extract:/build/dataplane/target/bpfel-unknown-none/release/novanet-ebpf bin/novanet-ebpf.bpf.o || true
          docker rm novanet-extract

      - name: Upload dataplane binary
        uses: actions/upload-artifact@v4
        with:
          name: novanet-dataplane
          path: bin/novanet-dataplane
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # Integration tests — manual trigger only.
  # Requires a pre-provisioned multi-node K3s cluster with NovaNet deployed.
  # The runner must have network access to the cluster nodes and kubectl configured.
  integration-tests:
    name: Integration Tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration_tests == 'true'
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      NOVANET_NS: novanet
      TEST_NS: novanet-test
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          if ! command -v sshpass &>/dev/null; then
            apt-get update -qq && apt-get install -y -qq sshpass || \
            yum install -y sshpass || \
            apk add --no-cache sshpass || true
          fi

      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Verify NovaNet DaemonSet
        run: |
          kubectl get daemonset -n novanet -o wide
          kubectl get pods -n novanet -o wide

      - name: Make test scripts executable
        run: chmod +x tests/integration/*.sh

      - name: Run integration tests
        run: ./tests/integration/run-all.sh

      - name: Cleanup test namespace on failure
        if: failure()
        run: kubectl delete namespace novanet-test --timeout=60s --wait=true 2>/dev/null || true

  status-check:
    name: Status Check
    if: always()
    needs: [lint, lint-helm, lint-rust, test-go, test-rust, build-go, build-rust, security]
    runs-on: ubuntu-latest
    steps:
      - name: Decide status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.lint-helm.result }}" == "failure" || \
                "${{ needs.lint-rust.result }}" == "failure" || \
                "${{ needs.test-go.result }}" == "failure" || \
                "${{ needs.build-go.result }}" == "failure" || \
                "${{ needs.test-rust.result }}" == "failure" || \
                "${{ needs.build-rust.result }}" == "failure" || \
                "${{ needs.security.result }}" == "failure" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
