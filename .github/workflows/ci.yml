name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: "20"

# ============================================================================
# PHASE 1: CODE QUALITY
# Fast linting and formatting checks — fail fast on obvious issues
# ============================================================================
jobs:
  phase1-changes:
    name: "Phase 1: Detect Changes"
    runs-on: arc-runner-novanet
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      helm: ${{ steps.filter.outputs.helm }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            rust:
              - 'dataplane/**'
              - 'Dockerfile.build'
              - 'Dockerfile.dataplane'
            helm:
              - 'deploy/helm/**'
            docs:
              - 'docs/**'

  phase1-lint-go:
    name: "Phase 1: Lint (Go)"
    needs: phase1-changes
    if: needs.phase1-changes.outputs.go == 'true'
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "::error::Code is not formatted. Run 'gofmt -s -w .' and commit the changes."
            gofmt -s -l .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          args: ${{ github.event_name == 'pull_request' && '--new-from-rev=origin/main' || '' }}

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit the changes."
            git diff go.mod go.sum
            exit 1
          fi

  phase1-lint-rust:
    name: "Phase 1: Lint (Rust)"
    needs: phase1-changes
    if: needs.phase1-changes.outputs.rust == 'true'
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dataplane/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('dataplane/Cargo.lock') }}

      - name: Check formatting
        working-directory: dataplane
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: dataplane
        run: cargo clippy -p novanet-common -p novanet-dataplane -- -D warnings

  phase1-lint-helm:
    name: "Phase 1: Lint (Helm)"
    needs: phase1-changes
    if: needs.phase1-changes.outputs.helm == 'true'
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/novanet/

      - name: Template render check
        run: helm template novanet deploy/helm/novanet/ > /dev/null

  phase1-gate:
    name: "Phase 1: Gate"
    runs-on: arc-runner-novanet
    needs: [phase1-changes, phase1-lint-go, phase1-lint-rust, phase1-lint-helm]
    if: always()
    steps:
      - name: Check phase 1 results
        run: |
          if [[ "${{ needs.phase1-lint-go.result }}" == "failure" || \
                "${{ needs.phase1-lint-rust.result }}" == "failure" || \
                "${{ needs.phase1-lint-helm.result }}" == "failure" ]]; then
            echo "::error::Phase 1 (Code Quality) failed."
            exit 1
          fi
          echo "Phase 1 passed."

  # ============================================================================
  # PHASE 2: COMPLIANCE
  # Documentation, security scanning, license checks
  # ============================================================================
  phase2-docs:
    name: "Phase 2: Docs Build"
    needs: phase1-gate
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4

      - name: Build documentation
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs

  phase2-docs-freshness:
    name: "Phase 2: Docs Freshness"
    needs: phase1-gate
    if: github.event_name == 'pull_request'
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check documentation freshness
        run: |
          CODE_CHANGED=$(git diff --name-only origin/main...HEAD -- '*.go' 'cmd/' 'internal/' 'api/' 'dataplane/' | wc -l)
          DOCS_CHANGED=$(git diff --name-only origin/main...HEAD -- 'docs/' | wc -l)
          if [ "$CODE_CHANGED" -gt 0 ] && [ "$DOCS_CHANGED" -eq 0 ]; then
            echo "::error::Code changed but no documentation updates. Update docs/ before merging."
            exit 1
          fi
          echo "Documentation is up to date."

  phase2-security:
    name: "Phase 2: Security"
    needs: phase1-gate
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  phase2-gate:
    name: "Phase 2: Gate"
    runs-on: arc-runner-novanet
    needs: [phase1-gate, phase2-docs, phase2-docs-freshness, phase2-security]
    if: always()
    steps:
      - name: Check phase 2 results
        run: |
          if [[ "${{ needs.phase1-gate.result }}" != "success" ]]; then
            echo "::error::Phase 1 gate did not pass (status: ${{ needs.phase1-gate.result }})"
            exit 1
          fi
          for r in "${{ needs.phase2-docs.result }}" "${{ needs.phase2-docs-freshness.result }}" "${{ needs.phase2-security.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::Phase 2 (Compliance) failed (status: $r)"
              exit 1
            fi
          done
          echo "Phase 2 passed."

  # ============================================================================
  # PHASE 3: UNIT TESTING
  # Run test suites with coverage and reporting
  # ============================================================================
  phase3-test-go:
    name: "Phase 3: Test (Go)"
    needs: phase2-gate
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.12.1

      - name: Run unit tests
        run: |
          CGO_ENABLED=1 gotestsum \
            --junitfile test-results.xml \
            --format pkgname \
            -- -race -count=1 -timeout=10m -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          echo "Threshold: ${COVERAGE_THRESHOLD}%"
          if awk "BEGIN {exit !($COVERAGE < $COVERAGE_THRESHOLD)}"; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "Coverage is above threshold."

      - name: Upload test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Go Test Results"
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

  phase3-test-rust:
    name: "Phase 3: Test (Rust)"
    needs: [phase2-gate, phase1-changes]
    if: needs.phase1-changes.outputs.rust == 'true'
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dataplane/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('dataplane/Cargo.lock') }}

      - name: Install cargo-nextest
        run: |
          curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Run Rust tests
        working-directory: dataplane
        run: |
          cargo nextest run \
            --profile ci \
            -p novanet-common \
            -p novanet-dataplane

      - name: Upload Rust test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Rust Test Results"
          path: dataplane/target/nextest/ci/rust-test-results.xml
          reporter: java-junit
          fail-on-error: false

  phase3-gate:
    name: "Phase 3: Gate"
    runs-on: arc-runner-novanet
    needs: [phase2-gate, phase3-test-go, phase3-test-rust]
    if: always()
    steps:
      - name: Check phase 3 results
        run: |
          if [[ "${{ needs.phase2-gate.result }}" != "success" ]]; then
            echo "::error::Phase 2 gate did not pass (status: ${{ needs.phase2-gate.result }})"
            exit 1
          fi
          for r in "${{ needs.phase3-test-go.result }}" "${{ needs.phase3-test-rust.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::Phase 3 (Unit Testing) failed (status: $r)"
              exit 1
            fi
          done
          echo "Phase 3 passed."

  # ============================================================================
  # PHASE 4: BUILDING
  # Compile binaries, build container images, run image scans
  # ============================================================================
  phase4-build-go:
    name: "Phase 4: Build (${{ matrix.binary }})"
    needs: phase3-gate
    runs-on: arc-runner-novanet
    strategy:
      matrix:
        include:
          - binary: novanet-agent
            path: ./cmd/novanet-agent/
          - binary: novanet-cni
            path: ./cmd/novanet-cni/
          - binary: novanetctl
            path: ./cmd/novanetctl/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.binary }}
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/${{ matrix.binary }} ${{ matrix.path }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: bin/${{ matrix.binary }}
          retention-days: 7

  phase4-build-rust:
    name: "Phase 4: Build (Rust/eBPF)"
    needs: [phase3-gate, phase1-changes]
    if: needs.phase1-changes.outputs.rust == 'true'
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4

      - name: Build Rust/eBPF via Docker
        run: |
          docker build -f Dockerfile.build -t novanet-builder .
          docker create --name novanet-extract novanet-builder /bin/true
          mkdir -p bin
          docker cp novanet-extract:/build/dataplane/target/release/novanet-dataplane bin/novanet-dataplane
          docker cp novanet-extract:/build/dataplane/target/bpfel-unknown-none/release/novanet-ebpf bin/novanet-ebpf.bpf.o || true
          docker rm novanet-extract

      - name: Upload dataplane binary
        uses: actions/upload-artifact@v4
        with:
          name: novanet-dataplane
          path: bin/novanet-dataplane
          retention-days: 7

  phase4-docker-test:
    name: "Phase 4: Docker Test"
    needs: phase3-gate
    runs-on: arc-runner-novanet
    steps:
      - uses: actions/checkout@v4

      - name: Build agent image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: false
          tags: novanet-agent:test

      - name: Build dataplane image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dataplane
          push: false
          tags: novanet-dataplane:test

      - name: Trivy scan agent image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'novanet-agent:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Trivy scan dataplane image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'novanet-dataplane:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  phase4-gate:
    name: "Phase 4: Gate"
    runs-on: arc-runner-novanet
    needs: [phase3-gate, phase4-build-go, phase4-build-rust, phase4-docker-test]
    if: always()
    steps:
      - name: Check phase 4 results
        run: |
          if [[ "${{ needs.phase3-gate.result }}" != "success" ]]; then
            echo "::error::Phase 3 gate did not pass (status: ${{ needs.phase3-gate.result }})"
            exit 1
          fi
          for r in "${{ needs.phase4-build-go.result }}" "${{ needs.phase4-build-rust.result }}" "${{ needs.phase4-docker-test.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::Phase 4 (Building) failed (status: $r)"
              exit 1
            fi
          done
          echo "Phase 4 passed."

  # ============================================================================
  # PHASE 5: DEPLOYMENT
  # Push container images (main branch only)
  # ============================================================================
  phase5-push:
    name: "Phase 5: Push (${{ matrix.image }})"
    needs: phase4-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: arc-runner-novanet
    strategy:
      matrix:
        include:
          - image: novanet-agent
            dockerfile: Dockerfile.agent
          - image: novanet-dataplane
            dockerfile: Dockerfile.dataplane
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/piwi3910/novanet/${{ matrix.image }}:sha-${{ github.sha }}
            ghcr.io/piwi3910/novanet/${{ matrix.image }}:latest

      - name: Trigger CT pipeline
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: deployment-complete

  # ============================================================================
  # STATUS CHECK
  # Final aggregator for branch protection
  # ============================================================================
  status-check:
    name: Status Check
    needs: phase4-gate
    if: always()
    runs-on: arc-runner-novanet
    steps:
      - name: Decide status
        run: |
          if [[ "${{ needs.phase4-gate.result }}" != "success" ]]; then
            echo "::error::Pipeline failed (phase4-gate status: ${{ needs.phase4-gate.result }})."
            exit 1
          fi
          echo "All pipeline phases passed."
