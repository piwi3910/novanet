name: Continuous Testing (CT)

on:
  repository_dispatch:
    types: [deployment-complete]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        type: choice
        options:
          - all
          - integration
          - e2e
          - functional
          - performance
        default: all

permissions:
  contents: read
  checks: write

jobs:
  ct-functional:
    name: "CT: Functional Tests"
    runs-on: qnap-nas
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'functional'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install gotestsum
        run: GOTOOLCHAIN=auto go install gotest.tools/gotestsum@latest
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Run functional tests
        run: |
          CGO_ENABLED=1 gotestsum \
            --junitfile ct-functional-results.xml \
            --format pkgname \
            -- -race -tags=functional -count=1 ./...
      - name: Upload test report
        if: always()
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        with:
          name: "CT: Functional Tests"
          path: ct-functional-results.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ct-functional-report
          path: ct-functional-results.xml
          retention-days: 30

  ct-integration:
    name: "CT: Integration Tests"
    runs-on: qnap-nas
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'integration'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run integration tests
        id: run-integration
        working-directory: tests/integration
        run: |
          chmod +x run-all.sh lib.sh *.sh
          ./run-all.sh 2>&1 | tee integration-output.txt
        continue-on-error: true
        env:
          NOVANET_NS: nova-system
      - name: Generate JUnit from results
        if: always()
        run: |
          OUTCOME="${{ steps.run-integration.outcome }}"
          if [ "$OUTCOME" = "success" ]; then
            FAILURES=0
            STATUS=""
          else
            FAILURES=1
            STATUS='<failure message="Integration tests failed">See integration-output.txt for details</failure>'
          fi
          cat > ct-integration-results.xml << XMLEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites name="NovaNET Integration Tests">
            <testsuite name="integration" tests="1" failures="$FAILURES">
              <testcase name="integration-suite" classname="novanet.integration">
                $STATUS
              </testcase>
            </testsuite>
          </testsuites>
          XMLEOF
      - name: Upload test report
        if: always()
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        with:
          name: "CT: Integration Tests"
          path: ct-integration-results.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ct-integration-report
          path: |
            ct-integration-results.xml
            tests/integration/integration-output.txt
          retention-days: 30

  ct-performance:
    name: "CT: Performance Tests"
    runs-on: qnap-nas
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'performance'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -count=3 -timeout=15m ./... 2>&1 | tee benchmark-results.txt
      - name: Generate summary
        if: always()
        run: |
          echo "## Performance Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ct-performance-report
          path: benchmark-results.txt
          retention-days: 30

  ct-summary:
    name: "CT: Summary"
    runs-on: qnap-nas
    needs: [ct-functional, ct-integration, ct-performance]
    if: always()
    steps:
      - name: Generate CT summary
        run: |
          echo "## Continuous Testing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Functional | ${{ needs.ct-functional.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.ct-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ needs.ct-performance.result }} |" >> $GITHUB_STEP_SUMMARY
