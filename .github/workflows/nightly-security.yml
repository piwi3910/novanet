name: Nightly Security Scan

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: qnap-nas
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy FS scan
        id: trivy-fs
        continue-on-error: true
        run: |
          trivy fs --severity CRITICAL,HIGH --format json --output trivy-fs-results.json .
          trivy fs --severity CRITICAL,HIGH --exit-code 1 . > trivy-fs-summary.txt 2>&1 || true
          VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' trivy-fs-results.json)
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create issue for FS vulnerabilities
        if: steps.trivy-fs.outputs.vuln_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VULN_COUNT=${{ steps.trivy-fs.outputs.vuln_count }}

          BODY=$(cat <<EOF
          ## Trivy Filesystem Scan — ${DATE}

          **${VULN_COUNT} vulnerabilities** found (CRITICAL/HIGH).

          <details>
          <summary>Full scan output</summary>

          \`\`\`
          $(head -200 trivy-fs-summary.txt)
          \`\`\`

          </details>

          ---
          *Generated by [Nightly Security Scan](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})*
          EOF
          )

          EXISTING=$(gh issue list --label "security,trivy" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Updated existing issue #${EXISTING}"
          else
            gh issue create \
              --title "Security: ${VULN_COUNT} Trivy FS vulnerabilities found (${DATE})" \
              --body "$BODY" \
              --label "security,trivy"
            echo "Created new security issue"
          fi

  trivy-images:
    name: Trivy Image Scan (${{ matrix.image }})
    runs-on: qnap-nas
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: novanet-agent
            dockerfile: Dockerfile.agent
          - image: novanet-dataplane
            dockerfile: Dockerfile.dataplane
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}:scan

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy image scan
        id: trivy-image
        continue-on-error: true
        run: |
          trivy image --severity CRITICAL,HIGH --format json --output trivy-image-results.json ${{ matrix.image }}:scan
          trivy image --severity CRITICAL,HIGH ${{ matrix.image }}:scan > trivy-image-summary.txt 2>&1 || true
          VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' trivy-image-results.json)
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create issue for image vulnerabilities
        if: steps.trivy-image.outputs.vuln_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          IMAGE="${{ matrix.image }}"
          VULN_COUNT=${{ steps.trivy-image.outputs.vuln_count }}

          BODY=$(cat <<EOF
          ## Trivy Image Scan: \`${IMAGE}\` — ${DATE}

          **${VULN_COUNT} vulnerabilities** found (CRITICAL/HIGH).

          <details>
          <summary>Full scan output</summary>

          \`\`\`
          $(head -200 trivy-image-summary.txt)
          \`\`\`

          </details>

          ---
          *Generated by [Nightly Security Scan](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})*
          EOF
          )

          EXISTING=$(gh issue list --label "security,trivy,$IMAGE" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Updated existing issue #${EXISTING}"
          else
            gh issue create \
              --title "Security: ${VULN_COUNT} vulnerabilities in ${IMAGE} image (${DATE})" \
              --body "$BODY" \
              --label "security,trivy,$IMAGE"
            echo "Created new security issue"
          fi
