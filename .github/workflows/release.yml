name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-go-binaries:
    name: Build Go (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: qnap-nas
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/novanet-agent   ./cmd/novanet-agent/
          go build -ldflags="-s -w" -o dist/novanet-cni     ./cmd/novanet-cni/
          go build -ldflags="-s -w" -o dist/novanetctl      ./cmd/novanetctl/
          tar czf dist/novanet-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            -C dist novanet-agent novanet-cni novanetctl

      - name: Upload release archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: novanet-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/novanet-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          retention-days: 1

  docker-agent:
    name: Docker agent (${{ matrix.arch.name }})
    strategy:
      matrix:
        arch:
          - name: amd64
            runner: qnap-nas
          - name: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/azrtydxb/novanet/novanet-agent
          tags: |
            type=semver,pattern=v{{version}},suffix=-${{ matrix.arch.name }}
            type=semver,pattern=v{{major}}.{{minor}},suffix=-${{ matrix.arch.name }}
            type=sha,format=short,suffix=-${{ matrix.arch.name }}
            type=raw,value=latest-${{ matrix.arch.name }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/${{ matrix.arch.name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  docker-dataplane:
    name: Docker dataplane (${{ matrix.arch.name }})
    strategy:
      matrix:
        arch:
          - name: amd64
            runner: qnap-nas
          - name: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/azrtydxb/novanet/novanet-dataplane
          tags: |
            type=semver,pattern=v{{version}},suffix=-${{ matrix.arch.name }}
            type=semver,pattern=v{{major}}.{{minor}},suffix=-${{ matrix.arch.name }}
            type=sha,format=short,suffix=-${{ matrix.arch.name }}
            type=raw,value=latest-${{ matrix.arch.name }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.dataplane
          platforms: linux/${{ matrix.arch.name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  docker-manifest:
    name: Docker Manifest
    runs-on: qnap-nas
    needs: [docker-agent, docker-dataplane]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tags
        id: tags
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          # Full semver: v1.2.3
          echo "semver=${REF}" >> "$GITHUB_OUTPUT"
          # Major.minor: v1.2
          MAJOR_MINOR=$(echo "$REF" | sed -E 's/^(v[0-9]+\.[0-9]+).*/\1/')
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          # Short SHA
          echo "sha=sha-$(echo ${GITHUB_SHA} | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Create and push manifests
        run: |
          OWNER="${{ github.repository_owner }}"
          for IMAGE in novanet-agent novanet-dataplane; do
            FULL="ghcr.io/${OWNER}/novanet/${IMAGE}"
            for TAG in "${{ steps.tags.outputs.semver }}" "${{ steps.tags.outputs.major_minor }}" "${{ steps.tags.outputs.sha }}" "latest"; do
              docker manifest create "${FULL}:${TAG}" \
                --amend "${FULL}:${TAG}-amd64" \
                --amend "${FULL}:${TAG}-arm64"
              docker manifest push "${FULL}:${TAG}"
            done
          done

  release:
    name: GitHub Release
    needs: [build-go-binaries, docker-agent, docker-dataplane, docker-manifest]
    runs-on: qnap-nas
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Go binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: novanet-linux-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true
          files: |
            artifacts/novanet-linux-amd64/novanet-linux-amd64.tar.gz
            artifacts/novanet-linux-arm64/novanet-linux-arm64.tar.gz
